name: bike_buddy
description: "Bike Buddy - motorbike rental platform for Nepal. Mobile app for renters and owners."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.2

  # Maps and location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Media
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Misc
  intl: ^0.20.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
